module:
  name: cliq
  path: .
  description: CLI toolkit library - terminal utilities, interactive menus, man-page guides, shell-like utilities, and Cobra integration helpers
  status: active

tags: [cli, terminal, menu, guide, sh, http, websocket, json, yaml, tail, fsnotify, prompts, toolkit, go, tui, interactive]

dependencies:
  uses:
    - github.com/manifoldco/promptui
    - github.com/spf13/cobra
    - github.com/gorilla/websocket
    - github.com/fsnotify/fsnotify
    - gopkg.in/yaml.v3
  used_by: []

entities:
  - name: Menu
    file: menu/menu.go
    tags: [struct, interactive, core]
    description: Interactive menu instance with config and options

  - name: Config
    file: menu/types.go
    tags: [struct, yaml, config]
    description: YAML-loadable menu configuration with categories and items

  - name: Options
    file: menu/types.go
    tags: [struct, config]
    description: Runtime options including ActionHandler for custom actions

  - name: SubstituteValues
    file: menu/exec.go
    tags: [function, template]
    description: Replace {{.key}} placeholders with values from map

  - name: Guide
    file: guide/guide.go
    tags: [struct, documentation, core]
    description: Man-page style documentation from embedded YAML files

  - name: Content
    file: guide/types.go
    tags: [struct, yaml]
    description: Guide topic with sections, categories, flags, and environment vars

  - name: Dim
    file: term/style.go
    tags: [function, styling]
    description: Return dimmed ANSI-styled text

  - name: MultiSelect
    file: term/multiselect.go
    tags: [function, interactive, core]
    description: Interactive multi-select with checkboxes, returns selected IDs

  - name: MultiSelectDeselected
    file: term/multiselect.go
    tags: [function, interactive]
    description: Like MultiSelect but returns deselected IDs (for skip lists)

  - name: SelectItem
    file: term/multiselect.go
    tags: [struct, interactive]
    description: Item for multi-select with ID, label, description, required flag

  - name: Copyable
    file: term/box.go
    tags: [function, display]
    description: Display content in a box with copy hint

  - name: MenuCommand
    file: cobrautil/menu.go
    tags: [function, cobra]
    description: Create a Cobra command that runs an interactive menu

  - name: GuideCommand
    file: cobrautil/guide.go
    tags: [function, cobra]
    description: Create a Cobra command for displaying guides

  - name: Run
    file: sh/cmd.go
    tags: [function, command, core]
    description: Execute a command and return Result with stdout/stderr/exitcode

  - name: Pipe
    file: sh/cmd.go
    tags: [function, command]
    description: Run command with input from previous Result's stdout

  - name: Command
    file: sh/cmd.go
    tags: [function, builder]
    description: Create command builder with Dir, Env, Stdin, Timeout options

  - name: HTTPClient
    file: sh/http.go
    tags: [struct, http, core]
    description: HTTP client with BaseURL, Auth, and JSON/form helpers

  - name: WSConn
    file: sh/ws.go
    tags: [struct, websocket, core]
    description: WebSocket connection with Send, Recv, and ExpectJSON

  - name: Data
    file: sh/data.go
    tags: [type, json, yaml, core]
    description: Generic map with dot-path access (Get, Set, GetString, etc.)

  - name: Tail
    file: sh/tail.go
    tags: [function, file, fsnotify]
    description: Follow multiple files with colored output using fsnotify

gotchas:
  - id: custom-action-handler
    tags: [menu, actions]
    summary: Custom actions require ActionHandler in Options or they fail silently
    section: Custom Actions Require Handler

  - id: template-syntax
    tags: [menu, templates]
    summary: Use {{.var}} not ${var} for command template variables
    section: Template Variables Use Go Template Syntax

  - id: input-id-match
    tags: [menu, inputs]
    summary: Input IDs must exactly match template variable names
    section: Input IDs Must Match Template Variables

  - id: term-zero-deps
    tags: [term, dependencies]
    summary: term/ package has zero external dependencies by design
    section: term Package Has Zero Dependencies

  - id: guide-index-required
    tags: [guide, yaml]
    summary: Guide package requires index.yaml in the embedded filesystem
    section: Guide Requires index.yaml

  - id: guide-prefix-match
    tags: [guide, config]
    summary: Options.Prefix must match the embed directory path
    section: Guide Filesystem Prefix

  - id: sh-result-err-vs-exitcode
    tags: [sh, command]
    summary: Result.Err is for exec errors, ExitCode for command exit status - use OK()
    section: sh.Result Error vs ExitCode

  - id: sh-data-path-syntax
    tags: [sh, data, json]
    summary: Data.Get uses dot-separated paths with array indexing (e.g., users.0.name)
    section: sh.Data Path Syntax

  - id: sh-ws-close-required
    tags: [sh, websocket]
    summary: WSConn starts a goroutine on Dial - always call Close() to stop it
    section: WebSocket Read Loop
